<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>So Paradi</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&display=swap" rel="stylesheet">
  <style>
    *, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }

    :root {
      --black: #0a0a0a;
      --white: #f0ede8;
      --grey: #2a2a2a;
      --accent: #f0ede8;
    }

    html, body {
      height: 100%;
      background: var(--black);
      color: var(--white);
      font-family: Verdana, sans-serif;
      overflow-x: hidden;
      cursor: crosshair;
    }

    /* GRAIN OVERLAY */
    body::before {
      content: '';
      position: fixed;
      inset: 0;
      background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 256 256' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='noise'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23noise)' opacity='0.08'/%3E%3C/svg%3E");
      pointer-events: none;
      z-index: 100;
      opacity: 0.4;
    }

    /* HERO */
    .hero {
      height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      position: relative;
      padding: 2rem;
    }

    .logo-wrap {
      width: min(1300px, 98vw);
      opacity: 0;
      transform: translateY(30px);
      animation: fadeUp 1.2s cubic-bezier(0.16, 1, 0.3, 1) 0.3s forwards;
    }

    .logo-wrap svg {
      width: 100%;
      height: auto;
    }

    .logo-wrap svg path {
      fill: var(--white);
    }

    .tagline {
      margin-top: 3rem;
      font-size: clamp(0.65rem, 1.2vw, 0.85rem);
      letter-spacing: 0.3em;
      text-transform: uppercase;
      color: #666;
      opacity: 0;
      animation: fadeUp 1s cubic-bezier(0.16, 1, 0.3, 1) 0.8s forwards;
    }

    .scroll-hint {
      position: absolute;
      bottom: 2.5rem;
      left: 50%;
      transform: translateX(-50%);
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 0.5rem;
      opacity: 0;
      animation: fadeUp 1s ease 1.5s forwards;
    }

    .scroll-hint span {
      font-size: 0.6rem;
      letter-spacing: 0.3em;
      color: #444;
      text-transform: uppercase;
    }

    .scroll-line {
      width: 1px;
      height: 40px;
      background: linear-gradient(to bottom, #444, transparent);
      animation: scrollPulse 2s ease infinite;
    }

    .section-divider {
      height: 1px;
      background: #1a1a1a;
      margin-bottom: 0;
    }

    /* PROJETS */
    .projects {
      padding: 0 clamp(1.5rem, 5vw, 6rem) 8rem;
    }

    .section-label {
      font-size: 0.6rem;
      letter-spacing: 0.4em;
      text-transform: uppercase;
      color: #444;
      margin-bottom: 4rem;
      padding-top: 2rem;
      border-top: 1px solid #1a1a1a;
    }

    .project-list {
      display: flex;
      flex-direction: column;
    }

    .project-item {
      display: grid;
      grid-template-columns: 4rem 1fr auto;
      align-items: center;
      gap: 2.5rem;
      padding: 2.8rem 1.5rem;
      border-bottom: 1px solid #1e1e1e;
      text-decoration: none;
      color: var(--white);
      position: relative;
      overflow: hidden;
      transition: color 0.3s ease;
    }

    .project-item::before {
      content: '';
      position: absolute;
      left: 0;
      top: 0;
      height: 100%;
      width: 0;
      background: #131313;
      transition: width 0.5s cubic-bezier(0.16, 1, 0.3, 1);
      z-index: 0;
    }

    .project-item:hover::before { width: 100%; }

    .project-item > * { position: relative; z-index: 1; }

    .project-num {
      font-size: 0.75rem;
      color: #777;
      letter-spacing: 0.15em;
    }

    .project-name {
      font-family: 'Bebas Neue', sans-serif;
      font-size: clamp(2.5rem, 5.5vw, 4.8rem);
      letter-spacing: 0.04em;
      line-height: 1;
      transition: transform 0.4s cubic-bezier(0.16, 1, 0.3, 1);
    }

    .project-item:hover .project-name {
      transform: translateX(1.2rem);
    }

    .project-meta {
      text-align: right;
      display: flex;
      flex-direction: column;
      gap: 0.5rem;
    }

    .project-tag {
      font-size: 0.78rem;
      letter-spacing: 0.18em;
      text-transform: uppercase;
      color: #999;
      display: block;
    }

    .project-status {
      font-size: 0.75rem;
      letter-spacing: 0.18em;
      text-transform: uppercase;
      color: #555;
    }

    .project-status.live {
      color: var(--white);
      font-weight: 700;
      letter-spacing: 0.22em;
    }

    /* FOOTER */
    footer {
      padding: 3rem clamp(1.5rem, 5vw, 6rem);
      border-top: 1px solid #1a1a1a;
      display: flex;
      justify-content: space-between;
      align-items: center;
      flex-wrap: wrap;
      gap: 1rem;
    }

    footer a {
      color: #555;
      text-decoration: none;
      font-size: 0.7rem;
      letter-spacing: 0.2em;
      text-transform: uppercase;
      transition: color 0.3s ease;
    }

    footer a:hover { color: var(--white); }

    .footer-copy {
      font-size: 0.6rem;
      color: #333;
      letter-spacing: 0.15em;
    }

    /* ANIMATIONS */
    @keyframes fadeUp {
      to { opacity: 1; transform: translateY(0); }
    }

    @keyframes scrollPulse {
      0%, 100% { opacity: 0.3; transform: scaleY(1); }
      50% { opacity: 1; transform: scaleY(1.3); }
    }

    /* RESPONSIVE */
    @media (max-width: 600px) {
      .project-item {
        grid-template-columns: 2.5rem 1fr auto;
        gap: 0.8rem;
        padding: 1.8rem 0.5rem;
      }
      .project-name {
        font-size: clamp(1.8rem, 7vw, 2.8rem);
      }
      .project-tag {
        font-size: 0.6rem;
        letter-spacing: 0.1em;
      }
      .project-status {
        font-size: 0.58rem;
        letter-spacing: 0.1em;
      }
    }
  </style>
</head>
